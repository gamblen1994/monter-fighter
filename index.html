<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dungeon RPG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background:#000; color:#00ff88; font-family: monospace; margin:0; padding:0; }
    #playerInfo { position:fixed; top:10px; left:10px; width:320px; font-size:22px; }
    #dialogBox { position:fixed; top:10px; right:10px; width:420px; font-size:24px; }
    #enemyCenter {
      position:fixed; top:45%; left:50%;
      transform:translate(-50%,-50%);
      text-align:center; font-size:48px; display:none;
    }
    .hpWrapper {
      position:fixed; top:80px;
      width:260px; height:28px;
      border:1px solid #00ff88; background:#111;
    }
    #playerHPBar { left:25%; }
    #enemyHPBar { right:25%; }
    .barFill { height:100%; background:#00ff88; }
    #controls {
      position:fixed; bottom:40px; left:50%;
      transform:translateX(-50%);
      width:600px; border:1px solid #00ff88; padding:20px;
      box-sizing:border-box;
    }
    #shop,#inventory{
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:360px; display:none;
      border:1px solid #00ff88; padding:15px;
      background:#000;
    }
    button{
      background:#111; color:#00ff88;
      border:1px solid #00ff88;
      padding:10px; margin:4px; cursor:pointer;
    }
    .boss { color:#ff4444; font-weight:bold; }
  </style>
</head>

    function recalcPlayerHPOnLevelUp() {
      player.maxhp = basePlayerHP + (player.level - 1) * hpPerLevel;

      player.hp = Math.min(player.maxhp, player.hp + Math.floor(hpPerLevel / 2));
    }

    // Scale a normal enemy based on player level
    function scaleNormalEnemy(base) {
      const lvl = player.level;

      if (lvl <= 3) {
        // keep early levels easier

      } else {
        // faster scaling later
        multiplier = 1 + Math.pow(lvl, 1.15) * 0.12;
      }
      const hp = Math.max(1, Math.floor(base.hp * multiplier + lvl * 2));
      const dmg = Math.max(1, Math.floor(base.dmg * (1 + lvl * 0.08) + Math.floor(lvl * 0.5)));
      return { name: base.name, sprite: base.sprite, hp: hp, maxhp: hp, dmg: dmg, isBoss: false };
    }

    // Create a boss scaled to current level
    function createBoss() {
      const lvl = player.level;
      // Boss becomes significantly stronger with level
      const bossBaseHp = 40;
      const hp = Math.floor(bossBaseHp + lvl * 18 + Math.pow(lvl, 1.3) * 6);
      const dmg = Math.max(2, Math.floor(6 + lvl * 2.2 + Math.pow(lvl, 1.05) * 0.8));
      const name = "Boss L" + lvl;
      return { name: name, sprite: "👹", hp: hp, maxhp: hp, dmg: dmg, isBoss: true };
    }

    // Boss depth - the number of rooms between bosses grows with level
    function currentBossDepth() {
      return baseBossDepth + Math.floor(player.level * bossDepthPerLevel);
    }
