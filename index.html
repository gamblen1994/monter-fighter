<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dungeon RPG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#000; --accent:#00ff88; --boss:#ff6b6b; --panel-pad:14px; --btn-pad:12px;
      --font-mono: "Courier New", Courier, monospace;
    }
    html,body{height:100%; margin:0; background:var(--bg); color:var(--accent); font-family:var(--font-mono); -webkit-tap-highlight-color: transparent;}
    #topRow{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px;}
    #playerInfo{font-size:18px;}
    #statusRow{font-size:14px; text-align:right;}
    /* Battle area */
    #battleArea{display:flex; justify-content:space-around; align-items:flex-start; gap:20px; margin-top:6px; position:relative; padding:6px;}
    .side{display:flex; flex-direction:column; align-items:center; gap:6px; min-width:110px;}
    #playerSprite, #enemySprite { width:96px; height:96px; display:flex; justify-content:center; align-items:center; font-size:64px; position:relative; z-index:2; }
    #playerSprite img, #enemySprite img{ max-width:100%; max-height:100%; border-radius:8px; }
    #enemyCenter{display:none; text-align:center; margin:6px auto;}
    #enemyHPText{font-size:14px;}
    /* sprite-specific HP bars */
    .sprite-hp { width:110px; height:12px; border:1px solid var(--accent); background:#111; border-radius:6px; overflow:hidden; }
    .sprite-fill{ height:100%; background:var(--accent); width:100%; transition:width 0.12s linear; }
    .gear { font-size:13px; color:var(--accent); }
    /* Dialog / story */
    #dialogBox{width:94%; max-width:520px; margin:6px auto; padding:8px; border:1px solid var(--accent); font-size:16px; box-sizing:border-box;}
    /* Controls - responsive */
    #controls{width:94%; max-width:760px; margin:10px auto; padding:12px; border:1px solid var(--accent); display:flex; flex-wrap:wrap; gap:8px; justify-content:center; box-sizing:border-box;}
    #controls button, #shop button, #inventory button{background:#111; color:var(--accent); border:1px solid var(--accent); padding:var(--btn-pad); margin:0; min-width:84px; font-size:16px; border-radius:6px; touch-action:manipulation;}
    .bigBtn{padding:14px 18px; font-size:18px;}
    #shop,#inventory{display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); width:92%; max-width:380px; padding:var(--panel-pad); border:1px solid var(--accent); background:var(--bg); z-index:40;}
    #saveControls{display:flex; gap:8px; align-items:center;}
    #saveStatus{font-size:13px; color:var(--accent); margin-left:6px;}
    .boss{color:var(--boss); font-weight:bold;}
    #invText{font-size:15px; margin-bottom:8px; text-align:center;}
    /* Sprite controls */
    #spriteControls{display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end;}
    #spriteOptions button{padding:6px 8px; font-size:18px;}
    /* Animations */
    .player-attack{ animation:playerLunge 300ms ease-in-out forwards; z-index:3; }
    .player-hit{ animation:playerHitFlash 300ms ease-in-out forwards; }
    .enemy-hit{ animation:enemyShake 260ms linear; }
    .enemy-attack{ animation:enemyLunge 300ms ease-in-out forwards; z-index:3; }
    @keyframes playerLunge { 0% { transform: translateX(0) scale(1); } 50% { transform: translateX(18px) scale(1.05); } 100% { transform: translateX(0) scale(1); } }
    @keyframes enemyLunge { 0% { transform: translateX(0) scale(1); } 50% { transform: translateX(-14px) scale(1.03); } 100% { transform: translateX(0) scale(1); } }
    @keyframes enemyShake { 0% { transform: translateX(0); filter:brightness(1); } 20% { transform: translateX(-6px); filter:brightness(1.4); } 40% { transform: translateX(6px); filter:brightness(1.1); } 60% { transform: translateX(-4px); filter:brightness(1.3); } 80% { transform: translateX(4px); filter:brightness(1.05); } 100% { transform: translateX(0); filter:brightness(1); } }
    @keyframes playerHitFlash { 0% { opacity:1; transform:scale(1); } 50% { opacity:0.6; transform:scale(0.98); filter:brightness(0.7); } 100% { opacity:1; transform:scale(1); filter:brightness(1); } }
    /* Effect styles */
    .effect { position:absolute; pointer-events:none; z-index:5; }
    .sword-swipe { width:120px; height:60px; border-radius:50%; background:linear-gradient(90deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05)); box-shadow:0 0 20px rgba(255,255,255,0.12), inset 0 0 10px rgba(255,255,255,0.08); transform-origin:center left; opacity:0.0; animation:swordSwipeAnim 420ms ease-out forwards; }
    @keyframes swordSwipeAnim { 0% { transform: translate(0,0) rotate(-30deg) scale(0.8); opacity:0; filter:blur(3px); } 30% { opacity:0.9; transform: translate(10px,0) rotate(-10deg) scale(1.05); filter:blur(0px); } 100% { opacity:0; transform: translate(30px,0) rotate(10deg) scale(1.2); filter:blur(4px); } }
    .magic-blast { width:18px; height:18px; border-radius:50%; background:radial-gradient(circle, #aaf 0%, #44f 60%, rgba(68,68,255,0.2) 100%); box-shadow:0 0 16px rgba(68,136,255,0.8), 0 0 36px rgba(120,160,255,0.35); transform:translate(0,0) scale(1); opacity:1; }
    .impact { position:absolute; width:48px; height:48px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.1) 40%, transparent 70%); opacity:0; animation:impactPop 260ms ease-out forwards; pointer-events:none; z-index:6; }
    @keyframes impactPop { 0% { transform:scale(0.3); opacity:0.95; filter:blur(1px); } 60% { transform:scale(1.05); opacity:0.8; filter:blur(0px); } 100% { transform:scale(1.3); opacity:0; } }
    /* Responsive tweaks */
    @media (max-width:600px){
      #playerSprite, #enemySprite { width:80px; height:80px; font-size:48px; }
      #playerInfo{font-size:16px;}
      .sprite-hp{ width:100px; height:12px; }
      #controls button{flex:1 1 45%; min-width:120px;}
      .bigBtn{flex:1 1 100%;}
      #dialogBox{font-size:15px;}
    }
  </style>
</head>
<body>

  <div id="topRow">
    <div id="playerInfo">LVL:1 &nbsp; Weapon L:0 &nbsp; Armor L:0<br>HP:20/20 &nbsp; GOLD:50</div>
    <div id="statusRow">
      <div id="spriteControls">
        <div id="spriteOptions">
          <button onclick="setPlayerEmoji('🧙')">🧙</button>
          <button onclick="setPlayerEmoji('🗡️')">🗡️</button>
          <button onclick="setPlayerEmoji('🧝')">🧝</button>
          <button onclick="setPlayerEmoji('🧑‍🚀')">🧑‍🚀</button>
        </div>
        <input id="spriteUpload" type="file" accept="image/*" style="display:none" />
        <button onclick="document.getElementById('spriteUpload').click()">Upload</button>
        <div id="saveControls">
          <button id="saveBtn">Save</button>
          <button id="loadBtn">Load</button>
          <button id="resetBtn">Reset</button>
          <div id="saveStatus"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="battleArea">
    <div class="side" id="playerSide">
      <div id="playerSprite" aria-hidden="true"></div>
      <div class="gear" id="playerGear">W:0 • A:0</div>
      <div class="sprite-hp" id="playerSpriteHP"><div class="sprite-fill" id="playerSpriteFill"></div></div>
    </div>

    <div class="side" id="enemySide">
      <div id="enemyCenter">
        <div id="enemySprite"></div>
        <div id="enemyHPText"></div>
      </div>
      <div style="height:6px"></div>
      <div class="sprite-hp" id="enemySpriteHP"><div class="sprite-fill" id="enemySpriteFill"></div></div>
    </div>
  </div>

  <div id="dialogBox">
    <b>📖 STORY</b>
    <div id="dialogContent">Level 1 - Room 0<br>Choose a direction...</div>
  </div>

  <div id="controls">
    <button class="bigBtn" onclick="chooseRoom('left')">⬅️ LEFT</button>
    <button class="bigBtn" onclick="chooseRoom('right')">➡️ RIGHT</button>
    <button onclick="attack()">ATTACK</button>
    <button onclick="runAway()">RUN</button>
    <button onclick="heal()">HEAL</button>
    <button onclick="openShop()">SHOP</button>
    <button onclick="openInventory()">INVENTORY</button>
  </div>

  <div id="shop">
    <b>SHOP</b><br><br>
    <button id="wBtn" onclick="buyWeapon()"></button>
    <button id="aBtn" onclick="buyArmor()"></button><br><br>
    <button onclick="buyPotion('small')">Small (10g)</button>
    <button onclick="buyPotion('medium')">Medium (20g)</button>
    <button onclick="buyPotion('large')">Large (35g)</button>
    <button onclick="buyPotion('mega')">Mega (60g)</button><br><br>
    <button onclick="closePanels()">Exit</button>
  </div>

  <div id="inventory">
    <b>INVENTORY</b><br><br>
    <div id="invText"></div><br>
    <button onclick="usePotion('small')">Use Small</button>
    <button onclick="usePotion('medium')">Use Medium</button>
    <button onclick="usePotion('large')">Use Large</button>
    <button onclick="usePotion('mega')">Use Mega</button><br><br>
    <button onclick="closePanels()">Exit</button>
  </div>

  <script>
    // Helper & save key
    const el = id => document.getElementById(id);
    const SAVE_KEY = 'dungeon_rpg_save_v1';

    // Tuning
    const basePlayerHP = 20;
    const hpPerLevel = 14;
    const earlyEasyLevels = 3;
    const baseBossDepth = 3;
    const bossDepthPerLevel = 0.6;
    const extraBossChance = 0.02;

    // combatStamp to avoid stale callbacks affecting new enemies
    let combatStamp = 0;

    // Game state (includes sprite fields)
    let player = {
      level: 1, exp:0, expNext:10,
      hp: basePlayerHP, maxhp: basePlayerHP,
      gold:50, weapon:0, armor:0,
      potions:{ small:0, medium:0, large:0, mega:0 },
      spriteEmoji: '🧙',
      spriteImg: null // data URL if uploaded
    };

    let enemy = null;
    let storedEnemy = null;
    let inCombat = false;
    let roomActive = false;
    let roomCount = 0;

    const healVal = { small:10, medium:20, large:30, mega:50 };
    const enemies = [
      { name:"Goblin", sprite:"👺", hp:16, dmg:3 },
      { name:"Skeleton", sprite:"💀", hp:20, dmg:4 },
      { name:"Slime", sprite:"🟢", hp:14, dmg:2 }
    ];

    // UI elements
    const playerSpriteEl = el('playerSprite');
    const enemySpriteEl = el('enemySprite');
    const enemyCenterEl = el('enemyCenter');
    const battleAreaEl = el('battleArea');
    const playerFillEl = el('playerSpriteFill');
    const enemyFillEl = el('enemySpriteFill');
    const playerGearEl = el('playerGear');

    // Sprite upload handling
    el('spriteUpload').addEventListener('change', async (ev)=>{
      const f = ev.target.files && ev.target.files[0];
      if(!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        player.spriteImg = reader.result;
        player.spriteEmoji = null;
        saveGame(false);
        updateUI();
      };
      reader.readAsDataURL(f);
    });

    function setPlayerEmoji(ch){
      player.spriteEmoji = ch;
      player.spriteImg = null;
      saveGame(false);
      updateUI();
    }

    // Recalc HP on level-up (fully heal)
    function recalcPlayerHPOnLevelUp(){
      player.maxhp = basePlayerHP + (player.level - 1) * hpPerLevel;
      player.hp = player.maxhp;
    }

    function scaleNormalEnemy(base){
      const lvl = player.level;
      let multiplier;
      if (lvl <= earlyEasyLevels) multiplier = 1 + lvl * 0.22;
      else multiplier = 1 + Math.pow(lvl, 1.35) * 0.18;
      const variance = 0.9 + Math.random() * 0.4;
      const hp = Math.max(1, Math.floor((base.hp * multiplier + lvl * 4) * variance));
      const dmg = Math.max(1, Math.floor((base.dmg * (1 + lvl * 0.14) + Math.floor(lvl * 0.9)) * (0.95 + Math.random()*0.2)));
      return { name: base.name, sprite: base.sprite, hp: hp, maxhp: hp, dmg: dmg, isBoss: false };
    }

    function createBoss(){
      const lvl = player.level;
      const bossBaseHp = 70;
      const hp = Math.floor(bossBaseHp + lvl * 32 + Math.pow(lvl, 1.25) * 12);
      const dmg = Math.max(4, Math.floor(10 + lvl * 3.2 + Math.pow(lvl, 1.05) * 1.6));
      const name = "Overlord L" + lvl;
      return { name: name, sprite: "👹", hp: hp, maxhp: hp, dmg: dmg, isBoss: true };
    }

    function currentBossDepth(){
      return Math.max(2, Math.floor(baseBossDepth + Math.floor(player.level * bossDepthPerLevel)));
    }

    /* ---------------- Save / Load ---------------- */
    function saveGame(showStatus = true){
      try{
        const data = {
          player, enemy, storedEnemy, inCombat, roomActive, roomCount, combatStamp
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        if(showStatus) showSaveStatus('Saved');
        return true;
      }catch(e){
        showSaveStatus('Save failed');
        return false;
      }
    }

    function loadGame(confirmOverwrite = true){
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw){ showSaveStatus('No save'); return false; }
      if(confirmOverwrite){
        if(!confirm('Load saved game and overwrite current progress?')) return false;
      }
      try{
        const data = JSON.parse(raw);
        if(data.player) player = data.player;
        enemy = data.enemy;
        storedEnemy = data.storedEnemy;
        inCombat = !!data.inCombat;
        roomActive = !!data.roomActive;
        roomCount = data.roomCount || 0;
        combatStamp = data.combatStamp || 0;
        // Ensure HP values are within bounds
        player.hp = Math.max(0, Math.min(player.hp || player.maxhp, player.maxhp || basePlayerHP));
        if(enemy){
          enemy.hp = Math.max(0, enemy.hp);
          // if enemy hp is 0 or less, clear it
          if(enemy.hp <= 0){ enemy = null; storedEnemy = null; inCombat = false; roomActive = false; }
        }
        showSaveStatus('Loaded');
        updateUI();
        return true;
      }catch(e){
        showSaveStatus('Load failed');
        return false;
      }
    }

    function clearSave(){
      if(!confirm('Clear saved game from local storage?')) return;
      localStorage.removeItem(SAVE_KEY);
      showSaveStatus('Save cleared');
    }

    let saveTimer = null;
    function showSaveStatus(text){
      el('saveStatus').innerText = text;
      if(saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(()=>{ el('saveStatus').innerText = ''; }, 2500);
    }

    /* ---------------- UI & shop ---------------- */
    function closePanels(){ el('shop').style.display = 'none'; el('inventory').style.display = 'none'; }
    function openShop(){ if(inCombat){ story("Can't shop"); return; } closePanels(); updateShop(); el('shop').style.display='block'; }
    function openInventory(){ if(inCombat){ story("Can't open inventory"); return; } closePanels(); el('inventory').style.display='block'; }
    function updateShop(){ el('wBtn').innerText = 'Weapon L' + player.weapon + ' (' + (20 + player.weapon*10) + 'g)'; el('aBtn').innerText = 'Armor L' + player.armor + ' (' + (20 + player.armor*10) + 'g)'; }
    function spendGold(x){ if(player.gold < x){ story('Not enough gold'); return false;} player.gold -= x; updateShop(); return true; }
    function buyWeapon(){ if(spendGold(20 + player.weapon*10)){ player.weapon++; story('Bought weapon L' + player.weapon); updateShop(); saveGame(false); } }
    function buyArmor(){ if(spendGold(20 + player.armor*10)){ player.armor++; story('Bought armor L' + player.armor); updateShop(); saveGame(false); } }
    function buyPotion(t){ const cost = { small:10, medium:20, large:35, mega:60 }[t]; if(spendGold(cost)){ player.potions[t]++; story('Bought ' + t); saveGame(false); } }

    /* ---------------- Combat & Visual Effects ---------------- */
    function getDamage(){ return 4 + player.weapon * 2; }
    function getDefense(){ return player.armor; }
    function critChance(){ return Math.min(0.06 + player.level * 0.01, 0.38); }

    // central enemy-death handler
    function handleEnemyDeath(textPrefix){
      // clear enemy and storedEnemy and flags
      enemy = null;
      storedEnemy = null;
      inCombat = false;
      roomActive = false;
      enemyCenterEl.style.display = 'none';
      // update UI and save
      updateUI();
      saveGame(false);
      if(textPrefix) story(textPrefix);
    }

    function attack(){
      if(!enemy){ story('No enemy'); return; }
      const localStamp = combatStamp; // capture current combat instance
      const dmgBase = getDamage();
      let dmg = dmgBase;
      let crit = false;
      if(Math.random() < critChance()){ dmg = Math.floor(dmg * 1.6); crit = true; }

      const useSword = player.weapon >= 2;
      triggerPlayerAttack();
      if(useSword) spawnSwordSwipeOnEnemy();
      else spawnMagicBlast();

      // apply damage mid-animation (only if enemy still same combat)
      setTimeout(()=>{
        if(!enemy || enemy.combatStamp !== localStamp) return;
        enemy.hp = Math.max(0, enemy.hp - dmg);
        let text = "You hit " + enemy.name + " for " + dmg + (crit ? " CRIT!" : "");
        triggerEnemyHit();
        spawnImpactOnEnemy();

        if(enemy.hp <= 0){
          // ensure hp clamped
          enemy.hp = 0;
          const gold = enemy.isBoss ? (50 + player.level * 8) : (14 + player.level * 4);
          player.gold += gold;
          gainExp(enemy.isBoss ? (30 + player.level * 4) : (8 + player.level * 2));
          if(!enemy.isBoss && Math.random() < 0.65){
            let types = ['small','medium','large'];
            let drop = types[Math.floor(Math.random()*3)];
            player.potions[drop]++;
            text += ' | Found ' + drop;
          }
          story(text + ' | Killed! +' + gold + 'g');
          // finalize death
          handleEnemyDeath();
          return;
        } else {
          story(text);
          updateUI();
        }
      }, 180);

      // enemy counterattack after animation if still alive and same combat
      setTimeout(()=>{
        if(!enemy || enemy.combatStamp !== localStamp) return;
        triggerEnemyAttack();
        setTimeout(()=>{
          if(!enemy || enemy.combatStamp !== localStamp) return;
          const edmg = Math.max(1, enemy.dmg - getDefense());
          player.hp = Math.max(0, player.hp - edmg);
          story(enemy.name + " hits " + edmg);
          if(player.hp <= 0) die(enemy.name);
          updateUI();
          saveGame(false);
        }, 200);
      }, 520);
    }

    function triggerPlayerAttack(){
      playerSpriteEl.classList.remove('player-attack');
      void playerSpriteEl.offsetWidth;
      playerSpriteEl.classList.add('player-attack');
      setTimeout(()=> playerSpriteEl.classList.remove('player-attack'), 350);
    }

    function triggerEnemyHit(){
      enemySpriteEl.classList.remove('enemy-hit');
      void enemySpriteEl.offsetWidth;
      enemySpriteEl.classList.add('enemy-hit');
      setTimeout(()=> enemySpriteEl.classList.remove('enemy-hit'), 300);
    }

    function triggerEnemyAttack(){
      enemySpriteEl.classList.remove('enemy-attack');
      void enemySpriteEl.offsetWidth;
      enemySpriteEl.classList.add('enemy-attack');
      playerSpriteEl.classList.remove('player-hit');
      void playerSpriteEl.offsetWidth;
      playerSpriteEl.classList.add('player-hit');
      setTimeout(()=>{ enemySpriteEl.classList.remove('enemy-attack'); playerSpriteEl.classList.remove('player-hit'); }, 350);
    }

    // Visual effects: sword swipe at enemy
    function spawnSwordSwipeOnEnemy(){
      if(!enemy) return;
      combatStamp = combatStamp; // no-op to show we use same stamp
      const areaRect = battleAreaEl.getBoundingClientRect();
      const enemyRect = enemySpriteEl.getBoundingClientRect();
      const effect = document.createElement('div');
      effect.className = 'effect sword-swipe';
      const left = (enemyRect.left - areaRect.left) - 40;
      const top = (enemyRect.top - areaRect.top) + (enemyRect.height/2) - 30;
      effect.style.left = left + 'px';
      effect.style.top = top + 'px';
      battleAreaEl.appendChild(effect);
      setTimeout(()=>{ try{ effect.remove(); }catch(e){} }, 600);
    }

    // Magic blast: projectile from player to enemy
    function spawnMagicBlast(){
      if(!enemy) return;
      const areaRect = battleAreaEl.getBoundingClientRect();
      const playerRect = playerSpriteEl.getBoundingClientRect();
      const enemyRect = enemySpriteEl.getBoundingClientRect();

      const startX = (playerRect.left - areaRect.left) + playerRect.width/2;
      const startY = (playerRect.top - areaRect.top) + playerRect.height/2;
      const endX = (enemyRect.left - areaRect.left) + enemyRect.width/2;
      const endY = (enemyRect.top - areaRect.top) + enemyRect.height/2;

      const blast = document.createElement('div');
      blast.className = 'effect magic-blast';
      blast.style.left = startX - 9 + 'px';
      blast.style.top = startY - 9 + 'px';
      battleAreaEl.appendChild(blast);

      const dx = endX - startX;
      const dy = endY - startY;

      const anim = blast.animate([
        { transform: 'translate(0px,0px)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px) scale(0.9)`, opacity: 0.85 }
      ], {
        duration: 420,
        easing: 'cubic-bezier(.2,.8,.2,1)',
        fill: 'forwards'
      });

      anim.onfinish = () => {
        try { spawnImpactAt(endX, endY); } catch(e){}
        blast.remove();
      };
    }

    function spawnImpactAt(centerX, centerY){
      const impact = document.createElement('div');
      impact.className = 'impact';
      impact.style.left = centerX - 24 + 'px';
      impact.style.top = centerY - 24 + 'px';
      battleAreaEl.appendChild(impact);
      setTimeout(()=>{ try{ impact.remove(); }catch(e){} }, 420);
    }

    function spawnImpactOnEnemy(){
      if(!enemy) return;
      const areaRect = battleAreaEl.getBoundingClientRect();
      const enemyRect = enemySpriteEl.getBoundingClientRect();
      const centerX = (enemyRect.left - areaRect.left) + enemyRect.width/2;
      const centerY = (enemyRect.top - areaRect.top) + enemyRect.height/2;
      spawnImpactAt(centerX, centerY);
    }

    /* ---------------- Rooms & Spawning ---------------- */
    function chooseRoom(dir){
      if(inCombat){ story('Finish fight'); return; }
      closePanels();
      if(storedEnemy){ enemy = storedEnemy; inCombat=true; enemyCenterEl.style.display='block'; story('You return... ' + enemy.name + ' waits!'); updateUI(); return; }
      if(roomActive){ story('Clear room first'); return; }
      roomCount++; roomActive = true;
      if(Math.random() < 0.22){
        let gold = 6 + player.level * 3; player.gold += gold; story('You found ' + gold + ' gold!'); roomActive=false; updateUI(); saveGame(false); return;
      }
      const bossDepth = currentBossDepth();
      const bossChance = extraBossChance + Math.min(0.12, player.level * 0.01);
      if((roomCount % bossDepth === 0) || Math.random() < bossChance){
        enemy = createBoss(); incrementCombatStampFor(enemy); storedEnemy = enemy; inCombat=true; enemyCenterEl.style.display='block'; story('You go ' + dir + '... ' + enemy.name + ' (BOSS) appears!'); updateUI(); saveGame(false); return;
      }
      let base = enemies[Math.floor(Math.random() * enemies.length)];
      enemy = scaleNormalEnemy(base); incrementCombatStampFor(enemy); storedEnemy = enemy; inCombat = true; enemyCenterEl.style.display = 'block'; story('You go ' + dir + '... ' + enemy.name + ' appears!'); updateUI(); saveGame(false);
    }

    // Stamp helper
    function incrementCombatStampFor(e){
      combatStamp++;
      if(e) e.combatStamp = combatStamp;
    }

    function runAway(){ if(!enemy){ story('Nothing to run'); return; } enemy=null; inCombat=false; enemyCenterEl.style.display='none'; story('You fled. Return to finish the room.'); updateUI(); saveGame(false); }

    /* ---------------- Healing / Potions ---------------- */
    function heal(){ if(player.hp >= player.maxhp){ story('HP is full'); return; } let order=['mega','large','medium','small']; for(let p of order){ if(player.potions[p] > 0){ usePotion(p); return; } } story('No potions'); }
    function usePotion(t){ if(player.hp >= player.maxhp){ story('HP is full'); return; } if(player.potions[t] <= 0){ story('No ' + t); return; } player.hp = Math.min(player.maxhp, player.hp + healVal[t]); player.potions[t]--; story('Used ' + t + ' (+' + healVal[t] + ')'); updateUI(); saveGame(false); }

    /* ---------------- UI ---------------- */
    function story(t){ el('dialogContent').innerHTML = 'Level ' + player.level + ' - Room ' + roomCount + '<br>' + t; }
    function updateUI(){
      el('playerInfo').innerHTML = 'LVL:' + player.level + ' &nbsp; Weapon L:' + player.weapon + ' &nbsp; Armor L:' + player.armor + '<br>HP:' + player.hp + '/' + player.maxhp + ' &nbsp; GOLD:' + player.gold;
      // render player sprite (image if uploaded else emoji)
      if(player.spriteImg){
        playerSpriteEl.innerHTML = '<img src="'+player.spriteImg+'" alt="player">';
      } else {
        playerSpriteEl.textContent = player.spriteEmoji || '🧙';
      }
      // gear under player
      playerGearEl.textContent = 'Weapon L:' + player.weapon + ' • Armor L:' + player.armor;
      if(enemy){
        // ensure enemy hp never negative
        enemy.hp = Math.max(0, enemy.hp);
        enemySpriteEl.style.fontSize = enemy.isBoss ? '72px' : '64px';
        enemySpriteEl.innerHTML = enemy.sprite && enemy.sprite.startsWith('data:') ? '<img src="'+enemy.sprite+'" alt="enemy">' : enemy.sprite;
        if(enemy.isBoss) el('enemyHPText').innerHTML = '<span class="boss">' + enemy.name + ' HP:' + enemy.hp + '/' + enemy.maxhp + '</span>';
        else el('enemyHPText').innerText = enemy.name + ' HP:' + enemy.hp + '/' + enemy.maxhp;
        enemyCenterEl.style.display = 'block';
      } else {
        enemySpriteEl.innerText = ''; el('enemyHPText').innerText = ''; enemyCenterEl.style.display = 'none';
      }
      // update sprite bars (avoid division by zero)
      playerFillEl.style.width = (player.maxhp > 0 ? (player.hp / player.maxhp * 100) : 0) + '%';
      enemyFillEl.style.width = enemy ? (enemy.maxhp > 0 ? (enemy.hp / enemy.maxhp * 100) : 0) + '%' : '0%';
      el('invText').innerHTML = 'Small ('+healVal.small+'):' + player.potions.small + '<br>Medium ('+healVal.medium+'):' + player.potions.medium + '<br>Large ('+healVal.large+'):' + player.potions.large + '<br>Mega ('+healVal.mega+'):' + player.potions.mega;
      updateShop();
    }

    function die(k){
      story('Killed by ' + k);
      player.level = 1; player.exp = 0; player.expNext = 10; player.maxhp = basePlayerHP; player.hp = player.maxhp; player.gold = 50;
      player.potions = { small:0, medium:0, large:0, mega:0 }; roomCount = 0; enemy=null; storedEnemy=null; inCombat=false; roomActive=false; enemyCenterEl.style.display='none';
      saveGame(false);
      updateUI();
    }

    /* ---------------- Autosave & Buttons ---------------- */
    setInterval(()=>{ saveGame(false); }, 15000);
    window.addEventListener('beforeunload', ()=>{ saveGame(false); });

    el('saveBtn').addEventListener('click', ()=>saveGame(true));
    el('loadBtn').addEventListener('click', ()=>loadGame(true));
    el('resetBtn').addEventListener('click', ()=>{ if(confirm('Reset game to defaults and clear save?')){ localStorage.removeItem(SAVE_KEY); location.reload(); } });

    // Initial render & expose debug
    setInterval(updateUI, 100);
    updateUI();
    window._save = saveGame; window._load = loadGame; window._clearSave = clearSave;
  </script>
</body>
</html>
